name: Nyxkor

services:
  db:
    image: mysql:8.0
    container_name: wp_db
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password_maestro
      MYSQL_DATABASE: wordpress
      MYSQL_USER: user_wp
      MYSQL_PASSWORD: password_wp
  wordpress:
    build:
      context: ..
      dockerfile: conf-docker/Dockerfile
    container_name: wp_app
    depends_on:
      - db
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_USER: user_wp
      WORDPRESS_DB_PASSWORD: password_wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ../:/var/www/html/ # Mapeo directo para desarrollo
  
volumes:
  db_data: 